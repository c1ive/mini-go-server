<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Go Server</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 60px auto;
      padding: 0 20px;
      line-height: 1.6;
      background: #f5f5f5;
      color: #222;
    }
    .card {
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }
    h1 {
      margin-top: 0;
    }
    code {
      background: #eee;
      padding: 2px 6px;
      border-radius: 6px;
    }
    a {
      color: #0066cc;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Hello from Go</h1>
    <p>This page is being served by the simple Go web server.</p>

    <h2>Try these routes</h2>
    <ul>
      <li><a href="/">Home</a></li>
      <li><a href="/path">/path</a></li>
      <li><a href="/admin">/admin</a></li>
    </ul>

    <p>Edit <code>index.html</code> to customize this page.</p>
  </div>
</body>
</html>
