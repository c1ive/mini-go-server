<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>403 Forbidden</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 60px auto;
      padding: 0 20px;
      background: #fff4f4;
      color: #222;
    }
    .card {
      background: white;
      padding: 24px;
      border-radius: 12px;
      border: 1px solid #f0caca;
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
    }
    h1 {
      color: #b00020;
    }
    a {
      color: #0066cc;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>403 Forbidden</h1>
    <p>You are not allowed to access the admin area.</p>
    <p><a href="/">Back to home</a></p>
  </div>
</body>
</html>
